# マウス操作を有効化
set -g mouse on

# macOS 12.7.6+ Terminal.app のマウス互換性修正
# xterm-256color の SGR 拡張マウスプロトコル (1006) が正しく動作しない場合の補完
set -ga terminal-overrides ",xterm*:XT:smcup@:rmcup@"

# 4ペイン分割レイアウトのキーバインド
# prefix + M で上下左右4分割
bind M split-window -h \; split-window -v \; select-pane -L \; split-window -v \; select-pane -t :.1

# ペイン移動（マウス + キーボード両対応）
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ペインリサイズ（Ctrl + 矢印キー）
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5

# スクロールをマウスホイールで可能にする
set -g @scroll-speed-num-lines-per-scroll 3

# viキーバインドでコピーモード
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi V send-keys -X select-line

# マウスドラッグで自動的にコピーモードに入る（先にペイン選択してからモード判定）
bind -T root MouseDrag1Pane select-pane -t = \; if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" "send-keys -M" "copy-mode -M"
# ドラッグ終了時にpbcopyへコピー（選択を維持する）
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseUp1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# ペイン番号表示を見やすく
set -g display-panes-time 2000
set -g pane-border-style fg=colour240
set -g pane-active-border-style fg=colour33

# ステータスバー
set -g status-bg colour235
set -g status-fg colour136
set -g status-left '[#S] '
set -g status-right '%Y-%m-%d %H:%M'

# 256色対応
set -g default-terminal "screen-256color"

# ペイン番号を0から始める
set -g base-index 1
setw -g pane-base-index 1

# プラグイン (TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# 自動保存・自動復元
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'  # 15分ごとに自動保存

# 復元対象プロセスに claude を追加（保存時に claude が走っていたペインで再起動）
# 復元時は直近セッションを自動再開（--continue）。過去セッションが無ければ通常起動にフォールバック
set -g @resurrect-processes 'claude "~claude->claude --continue"'

# セッション名が "claude" の場合、起動時に claude を自動実行し直近セッションを再開
# 例: tmux new -s claude → 最初のペインで `claude --continue` が起動
# 過去セッションが無い場合（--continue が失敗）は通常起動にフォールバック
set-hook -g session-created 'if -F "#{==:#{session_name},claude}" "send-keys -t =claude: \"claude --continue || claude\" Enter"'

run '~/.tmux/plugins/tpm/tpm'
