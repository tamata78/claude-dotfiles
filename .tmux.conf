# マウス操作を有効化
set -g mouse on

# 4ペイン分割レイアウトのキーバインド
# prefix + M で上下左右4分割
bind M split-window -h \; split-window -v \; select-pane -L \; split-window -v \; select-pane -t :.1

# ペイン移動（マウス + キーボード両対応）
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ペインリサイズ（Ctrl + 矢印キー）
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5

# スクロールをマウスホイールで可能にする
set -g @scroll-speed-num-lines-per-scroll 3

# viキーバインドでコピーモード
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi V send-keys -X select-line

# マウスドラッグで自動的にコピーモードに入る
bind -T root MouseDrag1Pane if-shell -F "#{||:#{pane_in_mode},#{mouse_button_flag}}" "send-keys -M" "copy-mode -M"
# ドラッグ終了時にpbcopyへコピー（選択を維持する）
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseUp1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# ペイン番号表示を見やすく
set -g display-panes-time 2000
set -g pane-border-style fg=colour240
set -g pane-active-border-style fg=colour33

# ステータスバー
set -g status-bg colour235
set -g status-fg colour136
set -g status-left '[#S] '
set -g status-right '%Y-%m-%d %H:%M'

# 256色対応
set -g default-terminal "screen-256color"

# ペイン番号を0から始める
set -g base-index 1
setw -g pane-base-index 1

# プラグイン (TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# 自動保存・自動復元
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'  # 15分ごとに自動保存

run '~/.tmux/plugins/tpm/tpm'
